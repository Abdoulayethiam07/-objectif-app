<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mes Objectifs</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Objectifs">
<link rel="apple-touch-icon" href="icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');
  :root{--bg:#0A0A0F;--surface:#13131A;--card:#1C1C28;--border:#2A2A3D;--accent:#6C63FF;--accent-soft:#2D2B4E;--green:#22C55E;--green-soft:#162A1F;--amber:#F59E0B;--amber-soft:#2A2010;--text:#F1F0FF;--muted:#8B8BA8;--dim:#4A4A6A}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:100px;overflow-x:hidden}
  .header{padding:48px 24px 24px;animation:slideDown .5s ease both}
  .greeting{font-size:28px;font-weight:700;margin-bottom:4px}
  .subtitle{font-size:15px;color:var(--muted);margin-bottom:16px;min-height:24px}
  .global-bar-wrap{height:4px;background:var(--surface);border-radius:4px;overflow:hidden}
  .global-bar-fill{height:4px;background:var(--accent);border-radius:4px;width:0%;transition:width .8s cubic-bezier(.4,0,.2,1)}
  .tabs{display:flex;gap:4px;padding:0 24px 16px;animation:slideDown .5s ease .1s both}
  .tab{flex:1;padding:10px 0;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;background:var(--surface);color:var(--muted)}
  .tab.active{background:var(--accent-soft);color:var(--accent)}
  .section{display:none;padding:0 24px}.section.active{display:block}
  .goal-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:12px;cursor:pointer;transition:transform .15s,border-color .3s;position:relative;overflow:hidden;animation:slideUp .4s ease both;user-select:none;-webkit-user-select:none}
  .goal-card:active{transform:scale(.97)}.goal-card.done{border-color:var(--accent-soft)}
  .goal-card.bounce{animation:bounce .5s cubic-bezier(.36,.07,.19,.97) both}
  .card-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .emoji-circle{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .card-info{flex:1}.card-title{font-size:16px;font-weight:600;margin-bottom:3px}.card-streak{font-size:13px;font-weight:500}
  .check-circle{width:34px;height:34px;border-radius:17px;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.68,-.55,.27,1.55);flex-shrink:0;font-size:16px}
  .check-circle.checked{border-color:transparent;transform:scale(1.1)}
  .progress-track{height:5px;background:var(--surface);border-radius:5px;overflow:hidden;margin-bottom:10px}
  .progress-fill{height:5px;border-radius:5px;width:0%;transition:width 1s cubic-bezier(.4,0,.2,1)}
  .card-footer{display:flex;justify-content:space-between}.card-cat{font-size:12px;color:var(--muted)}.card-count{font-size:12px;color:var(--dim)}
  .confetti-container{position:absolute;top:40%;left:50%;pointer-events:none;z-index:10}
  .particle{position:absolute;width:8px;height:8px;border-radius:4px;opacity:0}
  .add-btn{width:100%;padding:14px;border:1px dashed var(--border);border-radius:16px;background:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;margin-top:4px}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .stat-card{background:var(--surface);border-radius:14px;padding:14px 10px;text-align:center;animation:slideUp .4s ease both}
  .stat-num{font-size:26px;font-weight:700}.stat-label{font-size:11px;color:var(--muted);margin-top:3px}
  .week-title{font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;margin-top:20px}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px}
  .day-cell{text-align:center}.day-name{font-size:10px;color:var(--muted);margin-bottom:5px}
  .day-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin:0 auto;background:var(--surface);color:var(--dim)}
  .day-dot.full{background:var(--green-soft);color:var(--green)}.day-dot.partial{background:var(--amber-soft);color:var(--amber)}.day-dot.today{box-shadow:0 0 0 2px var(--accent)}
  .reminder-card{background:var(--surface);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;animation:slideUp .4s ease both}
  .reminder-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .reminder-info{flex:1}.reminder-time{font-size:14px;font-weight:500}.reminder-desc{font-size:12px;color:var(--muted);margin-top:2px}
  .toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
  .toggle.on{background:var(--accent)}.toggle.off{background:var(--dim)}
  .toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;top:3px;transition:left .2s}
  .toggle.on::after{left:23px}.toggle.off::after{left:3px}
  .notif-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}
  .notif-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .notif-dot{width:20px;height:20px;border-radius:6px;background:var(--accent)}
  .notif-app{font-size:12px;font-weight:600;color:var(--muted)}.notif-time{font-size:11px;color:var(--dim);margin-left:auto}
  .notif-title{font-size:15px;font-weight:600;margin-bottom:4px}.notif-body{font-size:13px;color:var(--muted);line-height:1.5}
  .notif-actions{display:flex;gap:8px;margin-top:12px}
  .notif-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;background:none;color:var(--text);cursor:pointer}
  .notif-btn.primary{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(19,19,26,.92);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:12px 0 20px}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;font-size:11px;color:var(--dim);font-weight:500;transition:color .2s;border:none;background:none;font-family:'Outfit',sans-serif}
  .nav-item.active{color:var(--accent)}.nav-icon{font-size:20px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:430px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
  .modal-input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;margin-bottom:12px;outline:none;transition:border-color .2s}
  .modal-input:focus{border-color:var(--accent)}
  .emoji-picker{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .emoji-opt{width:44px;height:44px;border-radius:12px;border:1px solid var(--border);background:var(--surface);font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
  .emoji-opt.selected{border-color:var(--accent);background:var(--accent-soft)}
  .color-picker{display:flex;gap:8px;margin-bottom:20px}
  .color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
  .color-opt.selected{border-color:white;transform:scale(1.15)}
  .modal-submit{width:100%;padding:16px;border-radius:14px;border:none;background:var(--accent);color:white;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer}
  .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px}
  @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounce{0%{transform:scale(1)}20%{transform:scale(.93)}50%{transform:scale(1.05)}80%{transform:scale(.98)}100%{transform:scale(1)}}
  @keyframes particle-burst{0%{opacity:1;transform:translate(var(--tx0),var(--ty0)) scale(0)}50%{opacity:1}100%{opacity:0;transform:translate(var(--tx1),var(--ty1)) scale(1)}}
</style>
</head>
<body>
<div class="header">
  <div class="greeting" id="greeting">Bonjour 👋</div>
  <div class="subtitle" id="subtitle">Prêt à avancer ?</div>
  <div class="global-bar-wrap"><div class="global-bar-fill" id="globalBar"></div></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('objectifs',this)">Objectifs</button>
  <button class="tab" onclick="switchTab('suivi',this)">Suivi</button>
  <button class="tab" onclick="switchTab('rappels',this)">Rappels</button>
</div>
<div id="objectifs" class="section active">
  <div id="goalsList"></div>
  <button class="add-btn" onclick="openModal()">+ Ajouter un objectif</button>
</div>
<div id="suivi" class="section">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="week-title">Cette semaine</div>
  <div class="week-grid" id="weekGrid"></div>
  <div class="week-title">Progression par objectif</div>
  <div id="progressList"></div>
</div>
<div id="rappels" class="section">
  <div id="remindersList"></div>
  <button onclick="requestNotifications()" style="width:100%;padding:14px;border-radius:16px;border:none;margin-bottom:16px;background:#2D2B4E;color:#6C63FF;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer">🔔 Activer les notifications</button>
  <div class="week-title">Aperçu notification</div>
  <div class="notif-card">
    <div class="notif-header"><div class="notif-dot"></div><span class="notif-app">Mes Objectifs</span><span class="notif-time" id="notifTime">21:00</span></div>
    <div class="notif-title" id="notifTitle">Session de code — jour 13 🔥</div>
    <div class="notif-body" id="notifBody">Tu es à 1 journée de battre ton record. Ouvre ton éditeur maintenant.</div>
    <div class="notif-actions">
      <button class="notif-btn" onclick="snooze()">Plus tard</button>
      <button class="notif-btn primary" onclick="markDoneFromNotif()">C'est fait ✓</button>
    </div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchNav('objectifs',this)"><span class="nav-icon">🎯</span>Objectifs</button>
  <button class="nav-item" onclick="switchNav('suivi',this)"><span class="nav-icon">📊</span>Suivi</button>
  <button class="nav-item" onclick="switchNav('rappels',this)"><span class="nav-icon">🔔</span>Rappels</button>
</nav>
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Nouvel objectif</div>
    <input class="modal-input" id="goalTitleInput" placeholder="Ex: Lire 20 pages par jour" maxlength="40">
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Emoji</div>
    <div class="emoji-picker" id="emojiPicker"></div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px">Couleur</div>
    <div class="color-picker" id="colorPicker"></div>
    <input class="modal-input" id="goalTarget" type="number" placeholder="Objectif (nb de jours)" min="1" max="31" value="30">
    <button class="modal-submit" onclick="addGoal()">Ajouter</button>
  </div>
</div>
<script>
let goals=[
  {id:1,title:'Coder 1h par jour',category:'Tech',color:'#6C63FF',colorSoft:'#2D2B4E',streak:12,target:7,done:5,completedToday:false,emoji:'💻'},
  {id:2,title:'Épargner 30%',category:'Finance',color:'#22C55E',colorSoft:'#162A1F',streak:3,target:30,done:24,completedToday:false,emoji:'💰'},
  {id:3,title:'Anglais 30 min',category:'Habitude',color:'#F59E0B',colorSoft:'#2A2010',streak:0,target:7,done:3,completedToday:false,emoji:'🎧'},
];
const reminders=[
  {emoji:'💻',title:'Coder 1h',time:'21:00',desc:'Tous les jours',on:true},
  {emoji:'🎧',title:'Anglais 30 min',time:'08:00',desc:'Tous les jours',on:true},
  {emoji:'💰',title:'Épargne',time:'28 du mois',desc:'Mensuel',on:true},
  {emoji:'📊',title:'Bilan semaine',time:'Dim 20:00',desc:'Hebdomadaire',on:false},
];
const EMOJIS=['💻','📚','💰','🎧','🏃','🧘','✍️','🎯','💪','🌍'];
const COLORS=[{hex:'#6C63FF',soft:'#2D2B4E'},{hex:'#22C55E',soft:'#162A1F'},{hex:'#F59E0B',soft:'#2A2010'},{hex:'#EF4444',soft:'#2A1010'},{hex:'#00E5FF',soft:'#0A2A2D'},{hex:'#FF6B9D',soft:'#2D0F1E'}];
let selectedEmoji='🎯',selectedColor=COLORS[0],nextId=10;

function saveState(){localStorage.setItem('goals',JSON.stringify(goals));localStorage.setItem('lastDate',new Date().toDateString())}
function loadState(){const s=localStorage.getItem('goals'),d=localStorage.getItem('lastDate'),t=new Date().toDateString();if(s){goals=JSON.parse(s);if(d!==t){goals=goals.map(g=>({...g,completedToday:false}));saveState()}}}

function updateGreeting(){const h=new Date().getHours();document.getElementById('greeting').textContent=(h<12?'Bonjour':h<18?'Bonne après-midi':'Bonsoir')+' 👋'}

function renderGoals(){
  const completed=goals.filter(g=>g.completedToday).length;
  document.getElementById('globalBar').style.width=Math.round(completed/goals.length*100)+'%';
  document.getElementById('subtitle').textContent=completed===0?'Prêt à avancer ?':completed===goals.length?'💎 Parfait — journée complète !':completed+' sur '+goals.length+' — continue !';
  document.getElementById('goalsList').innerHTML=goals.map((g,i)=>`
    <div class="goal-card ${g.completedToday?'done':''}" id="card-${g.id}" onclick="checkGoal(${g.id})" style="animation-delay:${i*80}ms">
      <div class="confetti-container" id="confetti-${g.id}"></div>
      <div class="card-top">
        <div class="emoji-circle" style="background:${g.colorSoft}">${g.emoji}</div>
        <div class="card-info">
          <div class="card-title">${g.title}</div>
          <div class="card-streak" style="color:${g.streak>0?g.color:'#4A4A6A'}">${g.streak>0?'🔥 '+g.streak+' jours de suite':'Commence aujourd\'hui'}</div>
        </div>
        <div class="check-circle ${g.completedToday?'checked':''}" style="${g.completedToday?'background:'+g.color:''}">${g.completedToday?'✓':''}</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="background:${g.color};width:${Math.round(g.done/g.target*100)}%"></div></div>
      <div class="card-footer"><span class="card-cat">${g.category}</span><span class="card-count">${g.done}/${g.target}</span></div>
    </div>`).join('');
}

function checkGoal(id){
  const goal=goals.find(g=>g.id===id);
  if(goal.completedToday)return;
  goal.completedToday=true;goal.done=Math.min(goal.done+1,goal.target);goal.streak+=1;
  const card=document.getElementById('card-'+id);
  card.classList.add('bounce');card.addEventListener('animationend',()=>card.classList.remove('bounce'),{once:true});
  burstConfetti(id,goal.color);
  if(navigator.vibrate)navigator.vibrate([40,20,40]);
  saveState();renderGoals();renderStats();
  if(goals.every(g=>g.completedToday))setTimeout(bigCelebration,400);
}

function burstConfetti(id,base){
  const c=document.getElementById('confetti-'+id);if(!c)return;
  const cols=[base,'#6C63FF','#22C55E','#F59E0B','#FF6B9D','#00E5FF'];
  c.innerHTML='';
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='particle';
    const a=(i/14)*360,d=60+Math.random()*50;
    p.style.cssText=`background:${cols[i%cols.length]};--tx0:0px;--ty0:0px;--tx1:${Math.cos(a*Math.PI/180)*d}px;--ty1:${Math.sin(a*Math.PI/180)*d}px;animation:particle-burst .7s ease-out forwards;animation-delay:${i*20}ms`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',1000);
}

function bigCelebration(){
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,.92);z-index:200';
  o.innerHTML='<div style="font-size:64px;margin-bottom:16px">💎</div><div style="font-size:26px;font-weight:700;color:#F1F0FF;margin-bottom:8px">Journée parfaite !</div><div style="font-size:16px;color:#8B8BA8;margin-bottom:32px">Tous tes objectifs complétés</div><button onclick="this.parentElement.remove()" style="padding:14px 32px;border-radius:14px;border:none;background:#6C63FF;color:white;font-size:16px;font-weight:600;font-family:Outfit,sans-serif;cursor:pointer">Super ! 🚀</button>';
  document.body.appendChild(o);
}

function renderStats(){
  const best=Math.max(...goals.map(g=>g.streak));
  const done=goals.filter(g=>g.completedToday).length;
  const rate=Math.round(goals.reduce((a,g)=>a+g.done,0)/goals.reduce((a,g)=>a+g.target,0)*100);
  document.getElementById('statsGrid').innerHTML=`<div class="stat-card"><div class="stat-num" style="color:#6C63FF">${best}</div><div class="stat-label">Meilleure série</div></div><div class="stat-card"><div class="stat-num" style="color:#22C55E">${rate}%</div><div class="stat-label">Taux global</div></div><div class="stat-card"><div class="stat-num" style="color:#F59E0B">${goals.length}</div><div class="stat-label">Objectifs actifs</div></div>`;
  const days=['L','M','M','J','V','S','D'],states=['full','full','full','partial','full','','today'],scores=[3,2,3,1,3,0,done];
  document.getElementById('weekGrid').innerHTML=days.map((d,i)=>`<div class="day-cell"><div class="day-name">${d}</div><div class="day-dot ${states[i]}">${scores[i]>0?scores[i]:'—'}</div></div>`).join('');
  document.getElementById('progressList').innerHTML=goals.map((g,i)=>`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:14px;font-weight:500">${g.emoji} ${g.title}</span><span style="font-size:13px;color:var(--muted)">${Math.round(g.done/g.target*100)}%</span></div><div class="progress-track"><div class="progress-fill" style="background:${g.color};width:${Math.round(g.done/g.target*100)}%"></div></div></div>`).join('');
}

function renderReminders(){
  document.getElementById('remindersList').innerHTML=reminders.map((r,i)=>`<div class="reminder-card" style="animation-delay:${i*60}ms"><div class="reminder-icon" style="background:var(--surface)">${r.emoji}</div><div class="reminder-info"><div class="reminder-time">${r.time} — ${r.title}</div><div class="reminder-desc">${r.desc}</div></div><button class="toggle ${r.on?'on':'off'}" onclick="toggleReminder(${i})"></button></div>`).join('');
}
function toggleReminder(i){reminders[i].on=!reminders[i].on;renderReminders()}

function switchTab(name,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(name).classList.add('active');btn.classList.add('active');if(name==='suivi')renderStats();if(name==='rappels')renderReminders()}
function switchNav(name,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['objectifs','suivi','rappels'][i]===name));document.getElementById(name).classList.add('active');btn.classList.add('active');if(name==='suivi')renderStats();if(name==='rappels')renderReminders()}

function openModal(){document.getElementById('modalOverlay').classList.add('open');renderEmojiPicker();renderColorPicker()}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function closeModalOutside(e){if(e.target.id==='modalOverlay')closeModal()}
function renderEmojiPicker(){document.getElementById('emojiPicker').innerHTML=EMOJIS.map(e=>`<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('')}
function selectEmoji(e){selectedEmoji=e;renderEmojiPicker()}
function renderColorPicker(){document.getElementById('colorPicker').innerHTML=COLORS.map((c,i)=>`<div class="color-opt ${c.hex===selectedColor.hex?'selected':''}" style="background:${c.hex}" onclick="selectColor(${i})"></div>`).join('')}
function selectColor(i){selectedColor=COLORS[i];renderColorPicker()}
function addGoal(){const t=document.getElementById('goalTitleInput').value.trim(),n=parseInt(document.getElementById('goalTarget').value)||30;if(!t){document.getElementById('goalTitleInput').style.borderColor='#EF4444';return}goals.push({id:nextId++,title:t,category:'Personnel',color:selectedColor.hex,colorSoft:selectedColor.soft,streak:0,target:n,done:0,completedToday:false,emoji:selectedEmoji});saveState();closeModal();document.getElementById('goalTitleInput').value='';renderGoals()}

function snooze(){document.getElementById('notifBody').textContent='⏰ Rappel dans 20 min...';document.getElementById('notifTitle').textContent='Snoozé !'}
function markDoneFromNotif(){const u=goals.find(g=>!g.completedToday);if(u){checkGoal(u.id);switchNav('objectifs',document.querySelector('.nav-item'))}}

async function requestNotifications(){
  if(!('Notification' in window)){alert('Notifications non supportées sur ce navigateur');return}
  const p=await Notification.requestPermission();
  if(p==='granted'){scheduleNotifications();const t=document.createElement('div');t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#162A1F;border:1px solid #22C55E;color:#22C55E;padding:12px 20px;border-radius:14px;font-size:14px;font-weight:500;z-index:300;white-space:nowrap';t.textContent='✓ Notifications activées !';document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
}
function scheduleNotifications(){
  setInterval(()=>{
    if(Notification.permission!=='granted')return;
    const now=new Date(),h=now.getHours(),m=now.getMinutes();
    const undone=goals.filter(g=>!g.completedToday);if(!undone.length)return;
    if(h===8&&m===0)new Notification('Mes Objectifs 🌅',{body:`Bonjour ! ${undone.length} objectif${undone.length>1?'s':''} aujourd'hui.`,icon:'/icon.png'});
    if(h===21&&m===0){const g=undone[0];new Notification(`${g.emoji} ${g.title}`,{body:g.streak>0?`🔥 Série de ${g.streak} jours — ne la casse pas !`:'Lance-toi, chaque jour compte.',icon:'/icon.png'})}
  },60000);
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));

loadState();updateGreeting();renderGoals();renderStats();renderReminders();
const n=new Date();document.getElementById('notifTime').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
</script>
</body>
